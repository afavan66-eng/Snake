<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snake Online 🐍</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f1220;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center
}
h1{margin:12px 0}
canvas{
  background:#111;
  border:2px solid #3cff00;
  touch-action:none
}
.panel{
  display:flex;
  gap:10px;
  margin:8px 0;
  flex-wrap:wrap;
  justify-content:center
}
input{
  padding:10px;
  border-radius:8px;
  border:none
}
button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#3cff00;
  color:#000;
  font-weight:700
}
.scores{
  width:95%;
  max-width:420px;
  background:#15192e;
  border-radius:12px;
  padding:10px
}
</style>
</head>

<body>
<h1>Snake Online 🐍</h1>

<div class="panel">
  <input id="username" placeholder="Kullanıcı adı" maxlength="12">
  <button id="start">Başlat</button>
  <button id="music">Müzik</button>
</div>

<canvas id="game" width="320" height="320"></canvas>

<div class="scores">
  <h3>🏆 En İyi Skorlar</h3>
  <ol id="leaderboard"></ol>
</div>

<audio id="bgm" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/03/audio_0f8a7d9d44.mp3?filename=arcade-113104.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  query, where, getDocs,
  orderBy, limit
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔐 Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyBOK4La1lZ8uL5iFikZN8d8agYgAV-BO6k",
  authDomain: "snake-793c9.firebaseapp.com",
  projectId: "snake-793c9",
  storageBucket: "snake-793c9.firebasestorage.app",
  messagingSenderId: "578303841065",
  appId: "1:578303841065:web:1db7cf42d209c4592fdd38"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ==== GAME ==== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const size = 16;
let snake, dir, food, score, loop;

const usernameInput = document.getElementById("username");

function reset(){
  snake=[{x:10,y:10}];
  dir={x:1,y:0};
  food={x:5,y:5};
  score=0;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#3cff00";
  snake.forEach(p=>ctx.fillRect(p.x*size,p.y*size,size,size));
  ctx.fillStyle="#ff3c3c";
  ctx.fillRect(food.x*size,food.y*size,size,size);
}

function step(){
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.y<0||h.x>=20||h.y>=20||snake.some((p,i)=>i&&p.x===h.x&&p.y===h.y)){
    gameOver();return;
  }
  snake.unshift(h);
  if(h.x===food.x&&h.y===food.y){
    score++;
    food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};
  } else snake.pop();
  draw();
}

/* ==== USERNAME CHECK ==== */
async function usernameExists(name){
  const q=query(collection(db,"scores"), where("username","==",name));
  const snap=await getDocs(q);
  return !snap.empty;
}

/* ==== START ==== */
async function startGame(){
  const name=usernameInput.value.trim();
  if(!name){
    alert("Kullanıcı adı zorunlu!");
    return;
  }
  if(await usernameExists(name)){
    alert("Bu kullanıcı adı zaten alınmış!");
    return;
  }
  reset();
  draw();
  clearInterval(loop);
  loop=setInterval(step,120);
}

/* ==== GAME OVER ==== */
async function gameOver(){
  clearInterval(loop);
  await addDoc(collection(db,"scores"),{
    username: usernameInput.value.trim(),
    score: score,
    at: Date.now()
  });
  await loadScores();
  alert("Oyun bitti! Skor: "+score);
}

/* ==== LEADERBOARD ==== */
async function loadScores(){
  const q=query(
    collection(db,"scores"),
    orderBy("score","desc"),
    limit(10)
  );
  const snap=await getDocs(q);
  const ol=document.getElementById("leaderboard");
  ol.innerHTML="";
  snap.forEach(d=>{
    const li=document.createElement("li");
    li.textContent=`${d.data().username} — ${d.data().score}`;
    ol.appendChild(li);
  });
}

/* ==== CONTROLS ==== */
window.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp"&&dir.y!==1)dir={x:0,y:-1};
  if(e.key==="ArrowDown"&&dir.y!==-1)dir={x:0,y:1};
  if(e.key==="ArrowLeft"&&dir.x!==1)dir={x:-1,y:0};
  if(e.key==="ArrowRight"&&dir.x!==-1)dir={x:1,y:0};
});

/* ==== UI ==== */
document.getElementById("start").onclick=startGame;
const bgm=document.getElementById("bgm");
document.getElementById("music").onclick=()=>bgm.paused?bgm.play():bgm.pause();

loadScores();
</script>
</body>
</html>
